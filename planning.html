<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning — Marcus Financial Planning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F5F1;
      --surface: #FFFFFF;
      --border: #E5E1D9;
      --text: #17140E;
      --sub: #58544A;
      --muted: #9A9589;
      --accent: #1B4F72;
      --accent-mid: #2775AA;
      --r-lg: 22px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(247,245,241,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 800px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px;
    }
    .nav-logo { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent); }
    .nav-link {
      font-size: 13px; font-weight: 600; color: var(--accent);
      text-decoration: none; padding: 9px 16px; border-radius: 100px;
    }
    .nav-cta {
      font-size: 13px; font-weight: 600; color: #fff;
      background: var(--accent); text-decoration: none;
      padding: 9px 18px; border-radius: 100px;
    }
    .nav-cta:hover { background: var(--accent-mid); }

    .page {
      max-width: 800px; margin: 0 auto;
      padding: 80px 24px 120px;
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px; text-align: center;
      font-size: 13px; color: var(--muted);
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Marcus<span>.</span></a>
      <div style="display:flex;gap:10px;align-items:center;">
        <a href="planning.html" class="nav-link">Planning</a>
        <a href="index.html#calculator" class="nav-cta">Check my numbers</a>
      </div>
    </div>
  </nav>

  <div class="page">
    <!-- content goes here -->
  </div>

  <footer>Marcus Financial Planning &nbsp;·&nbsp; Denver, CO</footer>

</body>
</html>
